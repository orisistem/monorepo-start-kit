---
- name: Install Docker on Ubuntu 24.04
  hosts: docker_hosts
  gather_facts: true
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker APT repository
      ansible.builtin.deb822_repository:
        name: docker
        types: [deb]
        uris: [https://download.docker.com/linux/ubuntu]
        suites: ["{{ ansible_facts['distribution_release'] }}"]
        components: [stable]
        architectures: ["{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else ('arm64' if ansible_facts['architecture'] == 'aarch64' else ansible_facts['architecture']) }}"]
        signed_by: /etc/apt/keyrings/docker.asc
        state: present
        enabled: true
        install_python_debian: true

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Start and enable Docker service
      ansible.builtin.systemd_service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Verify Docker installation
      ansible.builtin.command: docker --version
      changed_when: false
      register: docker_version_output

    - name: Print Docker version
      ansible.builtin.debug:
        msg: "Docker installed: {{ docker_version_output.stdout }}"

    - name: Verify Docker Compose installation
      ansible.builtin.command: docker compose version
      changed_when: false
      register: compose_version_output

    - name: Print Docker Compose version
      ansible.builtin.debug:
        msg: "Docker Compose installed: {{ compose_version_output.stdout }}"
